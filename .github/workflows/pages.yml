name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp dashboard/index.html      _site/index.html
          cp dashboard/data/events.json   _site/data/events.json
          cp dashboard/data/metadata.json _site/data/metadata.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
